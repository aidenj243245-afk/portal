<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Flow</title>

<style>
body {
margin: 0;
font-family: "Century Gothic", sans-serif;
background-color: #f4f6f9;
}

/* HEADER */
.header {
background: linear-gradient(90deg, #0a2a66, #123a8f);
color: white;
padding: 12px 30px;
display: flex;
align-items: center;
justify-content: space-between;
}

.logo img {
height: 40px;
}

.nav-links {
display: flex;
gap: 25px;
font-size: 14px;
}

.nav-links a {
color: white;
text-decoration: none;
cursor: pointer;
}

.nav-links a:hover {
text-decoration: underline;
}

/* SCREENS */
.screen {
display: none;
height: calc(100vh - 60px);
justify-content: center;
align-items: center;
}

.active {
display: flex;
}

/* LOGIN BOX */
.box {
background: white;
padding: 35px;
width: 320px;
border-radius: 10px;
box-shadow: 0 5px 20px rgba(0,0,0,0.1);
text-align: center;
}

h2 {
font-weight: normal;
margin-bottom: 20px;
}

/* INPUTS */
input {
width: 100%;
padding: 10px;
margin-bottom: 10px;
border: 1px solid #ccc;
border-radius: 5px;
background: #f2f2f2;
}

/* OPTIONS */
.options {
font-size: 13px;
margin: 10px 0;
text-align: left;
}

/* BUTTON */
.login-btn {
width: 100%;
padding: 12px;
background-color: #4da3ff;
color: white;
border: none;
border-radius: 25px;
cursor: pointer;
}

.login-btn:hover {
background-color: #2f8cff;
}

/* VERIFY BUTTONS */
.btn-group {
display: flex;
justify-content: space-between;
margin-top: 20px;
}

.btn {
width: 45%;
padding: 12px;
border-radius: 25px;
border: none;
cursor: pointer;
}

.yes {
background: rgba(0, 200, 0, 0.2);
color: green;
}

.no {
background: rgba(255, 0, 0, 0.2);
color: red;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">
<img src="logo.png" alt="logo">
</div>

<div class="nav-links">
<a onclick="alert('Español')">Español</a>
<a onclick="alert('Customer Service')">Customer Service</a>
<a onclick="alert('Location')">Location</a>
</div>
</div>

<!-- LOGIN SCREEN -->
<div id="login" class="screen active">
<div class="box">
<h2>Account Login</h2>

<input type="text" placeholder="Username">

<div class="options">
<label><input type="checkbox"> Remember my username</label>
</div>

<input type="password" placeholder="Password">

<div class="options">
<label><input type="checkbox" onclick="togglePassword()"> Show password</label>
</div>

<button class="login-btn" onclick="showPage('verify')">
Log in with password
</button>

<p style="font-size:13px;color:#0a2a66;cursor:pointer;margin-top:10px;">
Forgot username or password &gt;
</p>
</div>
</div>

<!-- VERIFY SCREEN -->
<div id="verify" class="screen">
<div class="box">
<h2>New Device Login</h2>
<p>Jason’s iPhone<br>Was this you?</p>

<div class="btn-group">
<button class="btn yes" onclick="showPage('thankyou')">
Yes
</button>

<button class="btn no" onclick="showPage('thankyou')">
No
</button>
</div>
</div>
</div>

<!-- THANK YOU SCREEN -->
<div id="thankyou" class="screen">
<div class="box">
<h2>Thank You for Confirming</h2>
<p>A support specialist will contact you shortly.</p>
</div>
</div>

<script>
function showPage(page) {
document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
document.getElementById(page).classList.add('active');
}

function togglePassword() {
const pw = document.querySelector('input[type="password"]');
pw.type = pw.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
